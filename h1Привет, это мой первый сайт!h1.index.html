<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Сайт с памятью 🧠</title>
  <style>
    body { text-align: center; padding-top: 100px; font-family: sans-serif; transition: 0.3s; background-color: #f0f2f5; }
    button { padding: 20px 40px; font-size: 24px; cursor: pointer; border-radius: 50px; border: 2px solid #333; }
    #counter-display { font-size: 80px; font-weight: bold; margin: 20px; }
  </style>
</head>
<body onload="loadCount()"> <!-- Запускаем загрузку при открытии -->

  <h1>Счётчик с памятью 🚀</h1>
  <div id="counter-display">0</div>
  <button onclick="handleClick()">Кликни!</button>
  <br><br>
  <button onclick="resetCount()" style="font-size: 14px; padding: 10px; background: #ff7675;">Сбросить всё</button>

  <script>
    let count = 0;

    // 1. Функция загрузки данных из памяти браузера
    function loadCount() {
      const savedCount = localStorage.getItem('myCount'); // Ищем сохраненное число
      if (savedCount !== null) {
        count = parseInt(savedCount); // Превращаем текст из памяти в число
        document.getElementById('counter-display').innerText = count;
      }
    }

    function handleClick() {
      count = count + 1;
      document.getElementById('counter-display').innerText = count;
      
      // 2. Сохраняем новое число в память браузера
      localStorage.setItem('myCount', count);
    }

    // 3. Функция для очистки памяти
    function resetCount() {
      count = 0;
      localStorage.removeItem('myCount');
      document.getElementById('counter-display').innerText = count;
    }
  </script>

</body>
</html>
