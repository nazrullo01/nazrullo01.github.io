<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мой Дизайнерский Сайт ✨</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <!-- Подключаем иконки FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
  
  <style>
    body {
      margin: 0; height: 100vh; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; overflow: hidden;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 40px; border-radius: 30px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      text-align: center;
      animation: fadeInUp 1s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    #counter-display { font-size: 100px; font-weight: 700; margin: 20px 0; }
    
    .magic-button {
      padding: 15px 40px; font-size: 18px; font-weight: 700;
      color: #764ba2; background: white; border: none;
      border-radius: 50px; cursor: pointer;
      transition: all 0.3s ease; margin-bottom: 20px;
    }
    .magic-button:hover { transform: translateY(-5px) scale(1.05); }

    /* СТИЛИ ДЛЯ ИКОНОК */
    .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
    .social-links a { 
      color: white; font-size: 30px; text-decoration: none; 
      transition: 0.3s; opacity: 0.8;
    }
    .social-links a:hover { opacity: 1; transform: scale(1.2); }
  </style>
</head>
<body>

  <div class="glass-card">
    <h1>Привет от Назрулло! 🚀</h1>
    <div id="counter-display">0</div>
    <button class="magic-button" onclick="handleClick()">ЗАРЯДИТЬ!</button>

    <div class="social-links">
      <!-- ЗАМЕНИ ССЫЛКИ НА СВОИ -->
      <a href="https://t.me" target="_blank"><i class="fab fa-telegram"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://github.com" target="_blank"><i class="fab fa-github"></i></a>
    </div>
  </div>

  <script>
    let count = parseInt(localStorage.getItem('myCount')) || 0;
    document.getElementById('counter-display').innerText = count;
    function handleClick() {
      count++;
      document.getElementById('counter-display').innerText = count;
      localStorage.setItem('myCount', count);
    }
  </script>
</body>
</html>
