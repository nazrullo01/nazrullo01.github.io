<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nazr News ✨</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <style>
    body { margin: 0; padding: 20px; font-family: 'Montserrat', sans-serif; background: #f4f7f6; }
    header { 
      text-align: center; padding: 40px; 
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); 
      color: white; border-radius: 15px; margin-bottom: 30px;
    }
    .news-container { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
      gap: 25px; max-width: 1200px; margin: 0 auto; 
    }
    .news-card { 
      background: white; border-radius: 15px; overflow: hidden; 
      box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: 0.3s;
    }
    .news-card:hover { transform: translateY(-10px); }
    
    /* СТИЛЬ ДЛЯ КАРТИНКИ */
    .news-image { 
      width: 100%; height: 200px; object-fit: cover; 
      background: #ddd; /* Цвет пока картинка грузится */
    }

    .news-content { padding: 20px; }
    .news-card h2 { margin: 0 0 10px; font-size: 1.3rem; color: #1e3c72; }
    .news-card p { font-size: 0.9rem; color: #555; line-height: 1.6; }
    .date { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }
  </style>
</head>
<body>

  <header>
    <h1>Nazr News 📰</h1>
    <p>Главные события из мира IT и жизни Назрулло</p>
  </header>

  <div class="news-container" id="news-list"></div>

  <script>
    const newsData =;

    const container = document.getElementById('news-list');

    newsData.forEach(item => {
      container.innerHTML += `
        <div class="news-card">
          <img src="${item.image}" class="news-image" alt="Новость">
          <div class="news-content">
            <div class="date">${item.date}</div>
            <h2>${item.title}</h2>
            <p>${item.description}</p>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
